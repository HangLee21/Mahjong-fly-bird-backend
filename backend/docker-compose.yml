services:
  postgres:
    image: postgres:16
    container_name: mahjong_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mahjong
    ports:
      - "5432:5432"
    volumes:
      - mahjong_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mahjong_redis
    ports:
      - "6379:6379"

volumes:
  mahjong_pg_data:
